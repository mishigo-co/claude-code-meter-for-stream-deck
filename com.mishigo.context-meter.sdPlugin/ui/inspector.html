<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Claude Meter</title>
		<style>
			:root {
				color-scheme: dark;
			}
			body {
				margin: 0;
				padding: 12px 14px;
				font:
					13px/1.4 "Segoe UI",
					-apple-system,
					sans-serif;
				color: #d8d8d8;
				background: #2d2d2d;
			}
			.item {
				display: flex;
				align-items: center;
				gap: 8px;
				margin-bottom: 10px;
			}
			label {
				flex: 0 0 84px;
				text-align: right;
				color: #969696;
			}
			select,
			button {
				flex: 1;
				min-height: 26px;
				padding: 2px 6px;
				color: #d8d8d8;
				background: #3d3d3d;
				border: 1px solid #1a1a1a;
				border-radius: 4px;
				font: inherit;
			}
			button {
				cursor: pointer;
			}
			button:hover {
				background: #484848;
			}
			textarea {
				width: 100%;
				min-height: 96px;
				padding: 6px 8px;
				color: #d8d8d8;
				background: #3d3d3d;
				border: 1px solid #1a1a1a;
				border-radius: 4px;
				font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
				resize: vertical;
				box-sizing: border-box;
			}
			.paste-area {
				display: none;
				margin: 4px 0 10px;
			}
			.paste-area.open {
				display: block;
			}
			.paste-area .row {
				display: flex;
				gap: 8px;
				margin-top: 6px;
			}
			.paste-area button {
				flex: 0 0 auto;
			}
			#status {
				min-height: 16px;
				margin-left: 92px;
				font-size: 12px;
			}
			#status.ok {
				color: #6ac46a;
			}
			#status.error {
				color: #e06464;
			}
		</style>
	</head>
	<body>
		<div class="item">
			<label for="character">Character</label>
			<select id="character"></select>
		</div>
		<div class="item">
			<label></label>
			<button id="import-btn" type="button">Import character…</button>
		</div>
		<div id="paste-area" class="paste-area">
			<textarea id="paste-text" placeholder="Paste a character pack JSON here" spellcheck="false" autocomplete="off"></textarea>
			<div class="row">
				<button id="paste-import" type="button">Import</button>
				<button id="paste-cancel" type="button">Cancel</button>
			</div>
		</div>
		<div id="status"></div>

		<script type="module" src="./inspector.js?v=5"></script>
	</body>
</html>
