<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Context Meter — Character Pack Editor</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #1c1c1e;
				--panel: #2a2a2c;
				--panel-2: #353537;
				--border: #1a1a1a;
				--text: #e5e5e7;
				--muted: #8e8e93;
				--accent: #4dabf5;
				--ok: #6ac46a;
				--err: #e06464;
			}
			* {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				padding: 16px 20px;
				font:
					13px/1.4 "Segoe UI",
					-apple-system,
					sans-serif;
				color: var(--text);
				background: var(--bg);
			}
			h1 {
				font-size: 16px;
				font-weight: 600;
				margin: 0 0 12px;
			}
			.layout {
				display: grid;
				grid-template-columns: auto auto 1fr;
				gap: 18px;
				align-items: start;
			}
			.panel {
				background: var(--panel);
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 12px 14px;
			}
			.panel h2 {
				font-size: 11px;
				font-weight: 600;
				letter-spacing: 0.04em;
				text-transform: uppercase;
				color: var(--muted);
				margin: 0 0 8px;
			}
			input,
			select,
			button,
			textarea {
				color: var(--text);
				background: var(--panel-2);
				border: 1px solid var(--border);
				border-radius: 4px;
				font: inherit;
				padding: 4px 8px;
			}
			button {
				cursor: pointer;
			}
			button:hover {
				background: #424244;
			}
			button.active {
				background: var(--accent);
				color: #0b1929;
				border-color: var(--accent);
			}
			textarea {
				font: 12px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
				width: 100%;
				min-height: 160px;
				padding: 8px 10px;
				resize: vertical;
			}

			/* Painter */
			.painter-wrap {
				position: relative;
			}
			#painter {
				display: block;
				image-rendering: pixelated;
				background: repeating-conic-gradient(#2a2a2c 0% 25%, #353537 0% 50%) 0 0 / 16px 16px;
				border: 1px solid var(--border);
				cursor: crosshair;
			}
			.face-overlay {
				position: absolute;
				border: 1px dashed rgba(255, 255, 255, 0.18);
				pointer-events: none;
			}

			/* Tool palette */
			.tools {
				display: grid;
				grid-template-columns: repeat(3, auto);
				gap: 4px;
			}
			.tool {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 4px 6px;
				min-width: 78px;
			}
			.tool .swatch {
				display: inline-block;
				width: 14px;
				height: 14px;
				border: 1px solid var(--border);
			}

			/* Palette inputs */
			.palette-row {
				display: flex;
				align-items: center;
				justify-content: space-between;
				gap: 10px;
				margin: 4px 0;
			}
			.palette-row label {
				flex: 1;
				color: var(--muted);
			}
			.palette-row input[type="color"] {
				width: 36px;
				height: 26px;
				padding: 0;
				border-radius: 4px;
				background: transparent;
			}

			/* Meta */
			.meta-row {
				display: grid;
				grid-template-columns: 70px 1fr;
				align-items: center;
				gap: 8px;
				margin: 6px 0;
			}
			.meta-row label {
				color: var(--muted);
			}
			.meta-row input,
			.meta-row select {
				width: 100%;
			}

			/* Preview */
			.preview-stack {
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
			}
			.preview-image {
				width: 144px;
				height: 144px;
				border: 1px solid var(--border);
				background: #000;
				image-rendering: pixelated;
			}
			.preview-controls {
				display: flex;
				gap: 6px;
				flex-wrap: wrap;
				justify-content: center;
			}

			.actions-row {
				display: flex;
				gap: 6px;
				margin-top: 8px;
				flex-wrap: wrap;
			}

			#status {
				min-height: 18px;
				font-size: 12px;
				margin-top: 6px;
			}
			#status.ok {
				color: var(--ok);
			}
			#status.error {
				color: var(--err);
			}

			.row-2col {
				display: grid;
				grid-template-columns: 1fr 1fr;
				gap: 14px;
				margin-top: 14px;
			}
		</style>
	</head>
	<body>
		<h1>Context Meter — Character Pack Editor</h1>

		<div class="layout">
			<!-- ────────── Painter ────────── -->
			<div class="panel">
				<h2>Body</h2>
				<div class="painter-wrap">
					<canvas id="painter" width="480" height="480"></canvas>
				</div>
			</div>

			<!-- ────────── Tools + palette + meta ────────── -->
			<div class="panel" style="min-width: 280px">
				<h2>Tools</h2>
				<div id="tools" class="tools"></div>

				<h2 style="margin-top: 16px">Palette</h2>
				<div id="palette"></div>

				<h2 style="margin-top: 16px">Pack info</h2>
				<div class="meta-row">
					<label for="meta-id">id</label>
					<input id="meta-id" type="text" spellcheck="false" />
				</div>
				<div class="meta-row">
					<label for="meta-name">name</label>
					<input id="meta-name" type="text" spellcheck="false" />
				</div>
				<div class="meta-row">
					<label for="meta-grid">grid</label>
					<select id="meta-grid">
						<option value="12">12 (coarse)</option>
						<option value="24" selected>24 (smooth)</option>
					</select>
				</div>
			</div>

			<!-- ────────── Preview + JSON ────────── -->
			<div class="panel">
				<h2>Live preview</h2>
				<div class="preview-stack">
					<img id="preview" class="preview-image" alt="character preview" />
					<div class="preview-controls">
						<button data-state="idle" class="state active">Idle</button>
						<button data-state="thinking" class="state">Thinking</button>
						<button data-state="generating" class="state">Generating</button>
						<button data-state="success" class="state">Success</button>
						<button data-state="sleeping" class="state">Sleeping</button>
					</div>
				</div>

				<div class="row-2col">
					<div>
						<h2>Load JSON</h2>
						<textarea id="json-in" placeholder="Paste an existing pack JSON to edit…"></textarea>
						<div class="actions-row">
							<button id="load">Load</button>
							<button id="reset">New / clear</button>
						</div>
					</div>
					<div>
						<h2>Export JSON</h2>
						<textarea id="json-out" readonly></textarea>
						<div class="actions-row">
							<button id="copy">Copy to clipboard</button>
						</div>
					</div>
				</div>
				<div id="status"></div>
			</div>
		</div>

		<script src="./editor.js"></script>
	</body>
</html>
